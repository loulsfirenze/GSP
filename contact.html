<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactez GS Peinture - Devis gratuit</title>
    <meta name="description" content="Contactez GS Peinture pour vos travaux de peinture à Clermont-Ferrand et demandez votre devis gratuit.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="top-banner">Devis gratuit sous 24h – Intervention rapide – Garantie décennale</div>
    <header>
        <div class="container">
            <a href="index.html" class="logo"><img src="images/logo.png" alt="GS Peinture"></a>
            <nav>
                <ul>
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="about.html">À propos</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="gallery.html">Réalisations</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <h1>Contact</h1>
        <form id="contactForm" novalidate>
            <label>Nom
                <input type="text" name="name" required>
            </label>
            <label>Email
                <input type="email" name="email" required>
            </label>
            <label>Téléphone
                <input type="tel" name="phone" required>
            </label>
            <label>Message
                <textarea name="message" required></textarea>
            </label>
            <button type="submit" class="cta">Envoyer</button>
        </form>
        <p id="formMessage" class="hidden">Merci pour votre demande, nous vous répondrons rapidement.</p>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 GS Peinture - Peintre à Saint Thibery</p>
        </div>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
